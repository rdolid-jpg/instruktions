<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Центр інструкцій</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --card-bg: #ffffff;
            --hover-color: #3b82f6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100%;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        h1 {
            font-weight: 600;
            margin-bottom: 30px;
            font-size: 28px;
            color: #0f172a;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            margin-bottom: 15px;
        }

        a {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            text-decoration: none;
            color: var(--text-color);
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-weight: 500;
            text-align: left;
        }

        a:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
        }

        /* Додаємо іконку стрілочки праворуч */
        a::after {
            content: '→';
            font-size: 1.2rem;
            opacity: 0.5;
            transition: transform 0.3s ease;
        }

        a:hover::after {
            opacity: 1;
            transform: translateX(5px);
        }

        /* Адаптивність для малих екранів */
        @media (max-width: 480px) {
            .container {
                padding: 25px 15px;
            }
            h1 {
                font-size: 22px;
            }
            a {
                padding: 15px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Документація та інструкції</h1>
    <ul>

            </a>
        </li> -->
        <li>

            </a>
        </li>
        <li>
            <a href="stratifications/index.html">

        </li>
        <li>
            <a href="popup/index.html">
                <span>Налаштування <strong>Pop-up</strong></span>
            </a>
        </li>
    </ul>
</div>
</body>
</html>
