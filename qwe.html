  <style>
      body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
    }
@keyframes notifSlideFromTop {
  0% {
    opacity: 0;
    transform: translateY(-40px);
  }
  100% {
    opacity: 1;
    transform: translateY(0);
  }
}

.notif-card {
  animation: notifSlideFromTop 0.45s ease-out forwards;
}

    .notif-wrapper {
      display: flex;
      justify-content: start;
      align-items: flex-start;
    }

    .notif-card {
      background: #262A34;
      width: 460px;
      border-radius: 0px 0px 8px 8px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
      padding: 10px 10px 10px;
    }

    .notif-top {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    /* fake logo */
    .notif-logo {
      width: 64px;
      height: 64px;
    }


    .notif-text {
      font-size: 15px;
      line-height: 1.5;
      color: #ffffff;
    }

    .notif-actions {
      display: flex;
      justify-content: flex-end;
      gap: 20px;
      align-items: center;
    }

    .notif-close {
      border: none;
      background: none;
      padding: 0;
      font-size: 20px;
      color: #4a47ea;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
    }

    .notif-btn {
      border: none;
      border-radius: 4px;
      padding: 8px 20px;
      font-size: 14px;
      cursor: pointer;
      background: #FDD835;
      color: #ffffff;
      font-weight: 500;
      text-decoration: none;
      margin-right: 25px;
    }

    .notif-btn:focus,
    .notif-link:focus {
      outline: 2px solid #1a73e8;
      outline-offset: 2px;
    }
    div#__overlay {
      display: none !important;
    }
    div#__root_centered {
    position: absolute;
    top: 0 !important;
    transform: translate(-50%, -50%);
    height: 0 !important;
}
  </style>
<div class="notif-wrapper">
  <div class="notif-card">

    <div class="notif-top">
      <img src="{%= o.image_url %}" class="notif-logo">

      <p class="notif-text">
        {%#(o.notif_text ? o.notif_text : "Please subscribe to our notifications for the latest news and updates!")%}
      </p>

    <a
        href="dp:close"
        class="notif-close"
        style="color: #ffffff"
      >
        {%#(o.close_button_text || "X")%}
      </a>
    </div>

    <div class="notif-actions">

      <a
        href="dp:ask_push_permissions"
        class="notif-btn"
        style="background:#FDD835;color:#262A34;"
      >
        {%#(o.primary_button_text || "Subscribe")%}
      </a>

    </div>
  </div>
</div>
<script>
{{label.script_for_popup_under_modal}}
</script>
